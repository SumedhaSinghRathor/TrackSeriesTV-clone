<section [class.opacity-0]="!episodeData" [class.pointer-events-none]="!episodeData"
    class="bg-black/60 text-white fixed inset-0 w-full h-full z-50 transition-opacity duration-500"
    (click)="removeEp()">
    <div [class.translate-x-full]="!episodeData" (click)="$event.stopPropagation()"
        class="absolute w-1/3 bg-white text-black right-0 mt-13 h-full transition-transform p-2 pb-16 flex flex-col justify-between pointer-events-auto duration-500">
        <div class="flex flex-col gap-2">
            <img [src]="episodeData?.epThumbnail" alt="" class="w-full rounded-lg">
            <h3 class="font-bold">{{episodeData.epTitle}}</h3>
            <p class="text-[13px]">{{episodeData.epDesc}}</p>
        </div>
        <div class="flex justify-end gap-2 text-sm">
            <button class="py-2 px-4 rounded-lg active:ring-2 ring-blue-300 ring-offset-2 bg-blue-950 text-white">Mark
                as
                unwatched</button>
            <button (click)="removeEp()"
                class="py-2 px-4 rounded-lg active:ring-2 ring-blue-300 ring-offset-2 border border-blue-100 text-blue-950">Close</button>
        </div>
    </div>
</section>
