<section class="bg-black/60 text-white fixed inset-0 w-full h-full z-50">
    <div [class.translate-x-full]="open"
        class="absolute w-1/3 bg-white text-black right-0 mt-13 h-full transition-transform p-2 pb-16">
        <img src={{episodeData.epThumbnail}} alt="" class="rounded-lg">
        <h3>{{episodeData.epTitle}}</h3>
        <p class="text-[13px]">{{episodeData.epDesc}}</p>
    </div>
</section>
