<section class="aspect-12/1 flex justify-center items-center mt-13">
    <form class="bg-white border border-blue-100 w-80 aspect-8/1 flex items-center rounded">
        <input type="text" class="grow px-2 focus:outline-none text-sm">
        <i class='bx bx-search text-blue-950 text-2xl p-1'></i>
    </form>
</section>
<section class="bg-slate-100 rounded-t-2xl overflow-clip">
    <div class="text-sm pt-4 flex justify-center">
        <p class="border border-blue-100 bg-white w-fit px-3 rounded-full"><b>1</b> results for <b>Tamon</b></p>
    </div>
    <div class="grid grid-cols-2 gap-6 p-6">
        <div *ngFor="let p of pieces"
            class="bg-white border border-blue-100 rounded-lg flex shadow-xl group text-blue-950">
            <img [routerLink]="['/show', 1]" src={{p.cover}}
                class="h-75 aspect-2/3 rounded-lg group-hover:scale-105 transition-all shadow-2xl cursor-pointer">
            <div class="w-full h-full flex flex-col">
                <div class="p-3 grow">
                    <a [routerLink]="['/show', 1]">
                        <h3 class="text-2xl font-bold">{{p.title}}</h3>
                    </a>
                    <p class="text-sm">{{p.tvStation}} | {{p.year}} | {{p.followers}} followers</p>
                    <p class="text-sm mt-2 line-clamp-5">{{p.description}}</p>
                </div>
                <div class="p-2 flex justify-end">
                    <select name="" id="" class="border border-blue-100 rounded p-1 focus:outline-0">
                        <option value="">Add to your Wishlist</option>
                        <option value="">Following</option>
                        <option value="">Move to abandonded</option>
                        <option value="">Stop following</option>
                    </select>
                </div>
            </div>
        </div>
    </div>
</section>
